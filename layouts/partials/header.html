<header class="site-header">
  <div class="container">
    <a class="site-title" href="{{ "/" | relURL }}">{{ site.Title }}</a>
    <nav class="site-nav">
      {{ range site.Menus.main }}
        <a href="{{ .PageRef | default .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
