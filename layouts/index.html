{{ define "main" }}
  <section class="intro">
    <h1>{{ site.Title }}</h1>
    {{ with site.Params.description }}<p class="lead">{{ . }}</p>{{ end }}
  </section>

  <section class="post-list">
    <h2>Latest posts</h2>
    <ul>
      {{ range first 10 (sort (where site.RegularPages "Section" "posts") "Date" "desc") }}
        <li>
          <a class="post-link" href="{{ .RelPermalink }}">{{ .Title }}</a>
          <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
        </li>
      {{ end }}
    </ul>
  </section>
{{ end }}
