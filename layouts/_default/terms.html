{{ define "main" }}
  <section class="term-list">
    <h1>{{ .Title }}</h1>
    <ul class="tags">
      {{ range .Data.Terms.Alphabetical }}
        <li><a class="tag" href="{{ .Page.RelPermalink }}">#{{ .Page.Title }}</a> <span class="count">{{ .Count }}</span></li>
      {{ end }}
    </ul>
  </section>
{{ end }}
