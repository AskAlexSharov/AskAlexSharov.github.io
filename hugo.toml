baseURL = "https://askalexsharov.github.io/"
locale = "en-us"
title = "Alexey Sharov"
enableRobotsTXT = true
# User site served from the domain root, so no path prefix is needed.

[pagination]
  pagerSize = 10

[params]
  description = "Notes on databases, storage engines, and systems programming."
  author = "Alexey Sharov"
  since = 2026   # shown in the footer copyright range

# Clean URLs like /posts/hello-world/ instead of .../hello-world.html
[permalinks]
  posts = "/posts/:slug/"

# Build a tag taxonomy (the default "categories" taxonomy is intentionally omitted).
[taxonomies]
  tag = "tags"

[markup.highlight]
  noClasses = false   # emit CSS classes so the stylesheet controls code colors
  lineNos = false

[[menu.main]]
  name = "Posts"
  pageRef = "/posts"
  weight = 10

[[menu.main]]
  name = "Tags"
  pageRef = "/tags"
  weight = 20

[[menu.main]]
  name = "About"
  pageRef = "/about"
  weight = 30
